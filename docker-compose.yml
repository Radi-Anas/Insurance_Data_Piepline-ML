version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: insurance_fraud_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insurance_fraud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance_fraud_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/insurance_fraud
    ports:
      - "8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance_fraud_dashboard
    depends_on:
      - api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/insurance_fraud
    ports:
      - "8501:8501"
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:

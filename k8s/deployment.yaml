apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-api
  labels:
    app: fraud-detection
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection
      component: api
  template:
    metadata:
      labels:
        app: fraud-detection
        component: api
    spec:
      containers:
      - name: api
        image: fraud-detection:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: database-url
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api-svc
spec:
  selector:
    app: fraud-detection
    component: api
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-dashboard
  labels:
    app: fraud-detection
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection
      component: dashboard
  template:
    metadata:
      labels:
        app: fraud-detection
        component: dashboard
    spec:
      containers:
      - name: dashboard
        image: fraud-detection:latest
        ports:
        - containerPort: 8501
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-dashboard-svc
spec:
  selector:
    app: fraud-detection
    component: dashboard
  ports:
  - port: 8501
    targetPort: 8501
  type: LoadBalancer
---
apiVersion: v1
kind: Secret
metadata:
  name: fraud-detection-secrets
type: Opaque
stringData:
  database-url: postgresql://postgres:password@postgres:5432/fraud_detection
  api-key: change-me-in-production
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraud-detection-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-detection-config
data:
  LOG_LEVEL: "INFO"
  CACHE_TTL: "300"
  MAX_WORKERS: "4"